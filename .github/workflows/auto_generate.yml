name: DMM X投稿文ジェネレーター

on:
  workflow_dispatch:
    inputs:
      post_start_index:
        description: '取得開始番号（空欄でランダム自動設定）例: 1→1〜20件目, 21→21〜40件目'
        required: false
        default: ''
        type: string
      dmm_sort_mode:
        description: 'ソートモード'
        required: false
        default: 'both'
        type: choice
        options:
          - both   # 新着20件＋人気20件（デフォルト・推奨）
          - date   # 新着順のみ20件
          - rank   # 人気順のみ20件
      dmm_floor:
        description: 'フロア種別'
        required: false
        default: 'videoa'
        type: choice
        options:
          - videoa
          - videoc
          - anime
          - doujin
          - comic
          - goods

  # スケジュール実行：毎日 JST 9:00 に新着＋人気の両方を自動生成
  schedule:
    - cron: '0 0 * * *'   # UTC 0:00 = JST 9:00

jobs:
  generate-posts:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python セットアップ
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.13'

      - name: 依存パッケージをインストール
        run: pip install requests

      # 取得開始番号が空欄またはスケジュール実行時はランダム値を自動設定（1〜480の範囲）
      - name: 取得開始番号を決定
        id: set_start_index
        run: |
          INPUT="${{ github.event.inputs.post_start_index }}"
          if [ -z "$INPUT" ]; then
            RAND=$(python3 -c "import random; print(random.randint(1, 480))")
            echo "start_index=$RAND" >> $GITHUB_OUTPUT
            echo "🎲 ランダム取得開始番号: $RAND"
          else
            echo "start_index=$INPUT" >> $GITHUB_OUTPUT
            echo "📌 指定取得開始番号: $INPUT"
          fi

      - name: X投稿文を生成
        env:
          DMM_API_ID:       ${{ secrets.DMM_API_ID }}
          DMM_AFFILIATE_ID: ${{ secrets.DMM_AFFILIATE_ID }}
          POST_START_INDEX: ${{ steps.set_start_index.outputs.start_index }}
          DMM_SORT_MODE:    ${{ github.event.inputs.dmm_sort_mode || 'both' }}
          DMM_FLOOR:        ${{ github.event.inputs.dmm_floor || 'videoa' }}
          # TXTをリポジトリに保存するためのフラグ
          SAVE_TO_REPO:     'true'
        run: python dmm_x_post_generator.py

      # ── TXTファイルをリポジトリにコミット（ZIPなしで直接ダウンロード可能に） ──
      - name: 生成したTXTをリポジトリにコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # outputsフォルダに移動して保存
          mkdir -p outputs
          mv dmm_x_posts_*.txt outputs/ 2>/dev/null || true

          git add outputs/
          git commit -m "🤖 自動生成: $(date +'%Y-%m-%d %H:%M') JST [開始番号: ${{ steps.set_start_index.outputs.start_index }}]" || echo "変更なし"
          git push
