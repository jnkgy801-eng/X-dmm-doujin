name: DMM X投稿文ジェネレーター

on:
  workflow_dispatch:
    inputs:
      post_start_index:
        description: '取得開始番号（1始まり）例: 1→1〜20件目, 21→21〜40件目'
        required: true
        default: '1'
        type: number
      dmm_floor:
        description: 'フロア種別'
        required: false
        default: 'videoa'
        type: choice
        options:
          - videoa
          - videoc
          - anime
          - doujin
          - comic
          - goods
      dmm_sort:
        description: 'ソート順'
        required: false
        default: '-date'
        type: choice
        options:
          - '-date'    # 新着順
          - '-rank'    # 人気順
          - '-price'   # 価格高い順
          - 'price'    # 価格安い順
          - '-review'  # レビュー順

  # スケジュール実行例（毎日9時に1〜20件目を自動生成）
  # schedule:
  #   - cron: '0 0 * * *'   # UTC 0:00 = JST 9:00

jobs:
  generate-posts:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install requests

      - name: X投稿文を生成
        env:
          DMM_API_ID:       ${{ secrets.DMM_API_ID }}
          DMM_AFFILIATE_ID: ${{ secrets.DMM_AFFILIATE_ID }}
          # workflow_dispatch で入力された値を使用。
          # スケジュール実行時は inputs が空なので || '1' でデフォルト値を補完。
          POST_START_INDEX: ${{ github.event.inputs.post_start_index || '1' }}
          DMM_FLOOR:        ${{ github.event.inputs.dmm_floor || 'videoa' }}
          DMM_SORT:         ${{ github.event.inputs.dmm_sort || '-date' }}
        run: python dmm_x_post_generator.py

      - name: 生成ファイルをアーティファクトとしてアップロード
        uses: actions/upload-artifact@v4
        with:
          name: dmm_x_posts_${{ github.run_number }}
          path: dmm_x_posts_*.txt
          retention-days: 7   # 7日間保存
